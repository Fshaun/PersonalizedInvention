<nav class="pi-nav">
  <div class="pi-nav__brand">
    <a routerLink="/">
      <span class="pi-nav__logo">PI</span>
      <span class="pi-nav__name">Personalized Invention</span>
    </a>
  </div>

  <div class="pi-nav__links">
    <a routerLink="/"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }">
      Shop
    </a>
    <a routerLink="/cart" routerLinkActive="active" class="pi-nav__cart">
      <span class="pi-nav__cart-icon">🛒</span>
      @if (cartCount > 0) {
        <span class="pi-nav__badge">{{ cartCount }}</span>
      }
    </a>
  </div>
</nav>
